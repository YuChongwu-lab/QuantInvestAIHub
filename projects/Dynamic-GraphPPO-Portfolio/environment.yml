name: dynamic-graphppo
channels:
  - pytorch
  - nvidia
  - pyg
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # PyTorch（与 CUDA 13.0 对应）
  - pip:
    - torch==2.9.1
    - torchvision

    # PyTorch Geometric
    - torch-geometric==2.7.0
    - torch-scatter
    - torch-sparse
    - torch-cluster
    - torch-spline-conv

    # 数据处理
    - numpy>=1.24.0
    - pandas>=1.5.0
    - scipy>=1.10.0
    - scikit-learn>=1.2.0

    # 配置与工具
    - PyYAML>=6.0
    - tqdm>=4.65.0

    # 可视化
    - matplotlib>=3.6.0
    - seaborn>=0.12.0

    # Jupyter（可选，用于 notebooks）
    - jupyter>=1.0.0
    - ipykernel>=6.22.0
    - ipywidgets>=8.0.0

    # 本项目（可编辑安装）
    - -e .
